<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0c18"/>
      <stop offset="100%" stop-color="#0b0d1a"/>
    </linearGradient>
    <linearGradient id="vg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b6fe8"/>
      <stop offset="100%" stop-color="#4f8ef7"/>
    </linearGradient>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1830"/>
      <stop offset="100%" stop-color="#141726"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b6fe8"/>
      <stop offset="100%" stop-color="#4f8ef7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(123,111,232,0.05)" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)" rx="16"/>

  <!-- Left glow -->
  <circle cx="0" cy="0" r="200" fill="rgba(123,111,232,0.07)"/>
  <!-- Right glow -->
  <circle cx="800" cy="500" r="160" fill="rgba(79,142,247,0.05)"/>

  <!-- Browser window frame -->
  <rect x="60" y="40" width="680" height="420" rx="12" fill="#0f0e1c" stroke="rgba(123,111,232,0.3)" stroke-width="1.2"/>

  <!-- Browser chrome bar -->
  <rect x="60" y="40" width="680" height="40" rx="12" fill="#161528"/>
  <rect x="60" y="64" width="680" height="16" fill="#161528"/>

  <!-- Window dots -->
  <circle cx="88" cy="60" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="108" cy="60" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="128" cy="60" r="6" fill="#22c55e" opacity="0.8"/>

  <!-- URL bar -->
  <rect x="155" y="48" width="390" height="24" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(123,111,232,0.2)" stroke-width="0.8"/>
  <text x="350" y="64" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11">monish-portfolio.netlify.app</text>

  <!-- Navbar in browser -->
  <rect x="60" y="80" width="680" height="44" fill="#0d0c1a"/>
  <rect x="60" y="80" width="680" height="1" fill="rgba(123,111,232,0.15)"/>

  <!-- Nav logo -->
  <rect x="80" y="90" width="30" height="30" rx="7" fill="url(#vg)"/>
  <text x="95" y="110" text-anchor="middle" fill="#000" font-size="10" font-weight="900">MS</text>
  <text x="120" y="105" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="700" font-family="'Segoe UI',sans-serif">Monish Shekh</text>
  <text x="120" y="117" fill="rgba(255,255,255,0.35)" font-size="8" font-family="'Segoe UI',sans-serif">MERN · React · Laravel</text>

  <!-- Nav links -->
  <text x="460" y="108" fill="rgba(255,255,255,0.5)" font-size="10" font-family="'Segoe UI',sans-serif">About</text>
  <text x="505" y="108" fill="rgba(255,255,255,0.5)" font-size="10" font-family="'Segoe UI',sans-serif">Projects</text>
  <text x="558" y="108" fill="rgba(255,255,255,0.5)" font-size="10" font-family="'Segoe UI',sans-serif">Skills</text>
  <rect x="600" y="95" width="60" height="22" rx="6" fill="url(#vg)"/>
  <text x="630" y="110" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="'Segoe UI',sans-serif">Contact</text>

  <!-- Hero section inside browser -->
  <!-- Left: Profile -->
  <circle cx="175" cy="285" r="70" fill="none" stroke="rgba(123,111,232,0.25)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="175" cy="285" r="58" fill="rgba(123,111,232,0.08)" stroke="rgba(123,111,232,0.4)" stroke-width="2"/>
  <circle cx="175" cy="275" r="22" fill="rgba(123,111,232,0.3)"/>
  <rect x="153" y="300" width="44" height="28" rx="22" fill="rgba(123,111,232,0.25)"/>
  <!-- OPEN badge -->
  <rect x="210" y="330" width="62" height="18" rx="9" fill="#0b0d14" stroke="#7b6fe8" stroke-width="0.8"/>
  <circle cx="220" cy="339" r="3" fill="#4ade80"/>
  <text x="248" y="343" text-anchor="middle" fill="#4ade80" font-size="7" font-weight="700">OPEN TO WORK</text>

  <!-- Right: Text content -->
  <text x="270" y="165" fill="#4f8ef7" font-size="10" font-weight="700" letter-spacing="2" font-family="'Segoe UI',sans-serif">👋 HEY THERE, I'M</text>
  <text x="270" y="195" fill="url(#vg)" font-size="26" font-weight="900" font-family="'Segoe UI',sans-serif">Monish Shekh</text>
  <!-- Typing cursor line -->
  <text x="270" y="218" fill="rgba(255,255,255,0.75)" font-size="13" font-family="'Segoe UI',sans-serif">Full Stack Developer</text>
  <rect x="428" y="205" width="2" height="16" fill="#7b6fe8" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- Skill pills -->
  <rect x="270" y="228" width="90" height="20" rx="10" fill="rgba(123,111,232,0.08)" stroke="rgba(123,111,232,0.2)" stroke-width="0.8"/>
  <text x="315" y="242" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9" font-family="'Segoe UI',sans-serif">MERN Stack</text>
  <rect x="368" y="228" width="72" height="20" rx="10" fill="rgba(123,111,232,0.08)" stroke="rgba(123,111,232,0.2)" stroke-width="0.8"/>
  <text x="404" y="242" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9" font-family="'Segoe UI',sans-serif">Laravel</text>
  <rect x="448" y="228" width="72" height="20" rx="10" fill="rgba(123,111,232,0.08)" stroke="rgba(123,111,232,0.2)" stroke-width="0.8"/>
  <text x="484" y="242" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="9" font-family="'Segoe UI',sans-serif">React.js</text>

  <!-- Info chips -->
  <rect x="270" y="258" width="120" height="30" rx="8" fill="rgba(123,111,232,0.05)" stroke="rgba(123,111,232,0.15)" stroke-width="0.8"/>
  <text x="280" y="270" fill="#4f8ef7" font-size="8" font-family="'Segoe UI',sans-serif">📍 Location</text>
  <text x="280" y="281" fill="rgba(255,255,255,0.55)" font-size="8" font-family="'Segoe UI',sans-serif">Anand, Gujarat</text>
  <rect x="398" y="258" width="130" height="30" rx="8" fill="rgba(123,111,232,0.05)" stroke="rgba(123,111,232,0.15)" stroke-width="0.8"/>
  <text x="408" y="270" fill="#4f8ef7" font-size="8" font-family="'Segoe UI',sans-serif">💼 Expertise</text>
  <text x="408" y="281" fill="rgba(255,255,255,0.55)" font-size="8" font-family="'Segoe UI',sans-serif">MERN · Laravel · React</text>

  <!-- CTA buttons -->
  <rect x="270" y="300" width="110" height="32" rx="8" fill="url(#vg)"/>
  <text x="325" y="320" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="'Segoe UI',sans-serif">⬇️ Download CV</text>
  <rect x="390" y="300" width="110" height="32" rx="8" fill="none" stroke="rgba(123,111,232,0.35)" stroke-width="1"/>
  <text x="445" y="320" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="10" font-weight="600" font-family="'Segoe UI',sans-serif">🚀 See Projects</text>

  <!-- Social icons row -->
  <text x="400" y="365" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="9" letter-spacing="2" font-family="'Segoe UI',sans-serif">FIND ME ON</text>
  <rect x="310" y="372" width="36" height="36" rx="9" fill="rgba(123,111,232,0.05)" stroke="rgba(123,111,232,0.15)" stroke-width="0.8"/>
  <text x="328" y="396" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">⌨</text>
  <rect x="354" y="372" width="36" height="36" rx="9" fill="rgba(123,111,232,0.05)" stroke="rgba(123,111,232,0.15)" stroke-width="0.8"/>
  <text x="372" y="396" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">in</text>
  <rect x="398" y="372" width="36" height="36" rx="9" fill="rgba(123,111,232,0.05)" stroke="rgba(123,111,232,0.15)" stroke-width="0.8"/>
  <text x="416" y="396" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">✉</text>
  <rect x="442" y="372" width="36" height="36" rx="9" fill="rgba(123,111,232,0.05)" stroke="rgba(123,111,232,0.15)" stroke-width="0.8"/>
  <text x="460" y="396" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">📷</text>

  <!-- Gradient bottom bar -->
  <rect x="60" y="450" width="680" height="10" rx="0" fill="url(#vg)" opacity="0.15"/>
  <rect x="60" y="448" width="680" height="12" rx="0" fill="none" stroke="rgba(123,111,232,0.2)" stroke-width="0"/>

  <!-- Corner label -->
  <rect x="590" y="130" width="130" height="22" rx="11" fill="rgba(123,111,232,0.12)" stroke="rgba(123,111,232,0.2)" stroke-width="0.8"/>
  <text x="655" y="145" text-anchor="middle" fill="#7b6fe8" font-size="9" font-weight="700" font-family="'Segoe UI',sans-serif">React + Vite + Framer</text>
</svg>
